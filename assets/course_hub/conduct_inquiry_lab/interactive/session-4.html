**Breaking Down the Command:**

1.  **`data$overallscore`:**┬аThis selects the┬а`overallscore`┬аcolumn from the┬а`data`┬аdataframe.

2.  **`data$schooltype == &quot;Elementary&quot;`:**┬аThis creates a logical vector (TRUE/FALSE) that is┬а`TRUE`┬аfor rows where the┬а`schooltype`┬аcolumn equals &quot;Elementary&quot; and┬а`FALSE`┬аotherwise.

3.  **`data$overallscore[data$schooltype == &quot;Elementary&quot;]`:**┬аThis uses the logical vector to subset┬а`overallscore`, selecting only those values where┬а`schooltype`┬аis &quot;Elementary.&quot;

4.  **`summary()`:**┬аThe┬а`summary()`┬аfunction then computes summary statistics (such as the minimum, 1st quartile, median, mean, 3rd quartile, and maximum) for the selected subset of┬а`overallscore`.

### Method 2

  filter(schooltype==&quot;Elementary&quot;)%&gt;%

## Error in `UseMethod()`:

**Breaking Down the Command:**

1.  **`data %&gt;%`:**┬аStarts a pipeline where the┬а`data`┬аdataframe is passed into the next function.

2.  **`filter(schooltype == &quot;Middle&quot;)`:**┬аFilters the┬а`data`┬аdataframe to include only rows where the┬а`schooltype`column is equal to &quot;Middle.&quot; The result is a smaller dataframe containing only middle schools.

3.  **`.$overallscore`:**┬аExtracts the┬а`overallscore`┬аcolumn from the filtered dataframe. The┬а`.`┬аrefers to the dataframe that results from the previous step in the pipeline.

4.  **`summary()`:**┬аApplies the┬а`summary()`┬аfunction to the extracted┬а`overallscore`┬аcolumn, generating summary statistics such as the minimum, 1st quartile, median, mean, 3rd quartile, and maximum for middle schools.

Breaking Down the Command:

    -   **`ifelse(overallgrade == &quot;A&quot;, 1, ifelse(overallgrade == &quot;&quot;, NA, 0))`:**

## Creating an Index Variable

Now, let&#39;s create an index of the progress grade and the performance grade. We first convert the grades to numeric variables.

We assign a score of 4 to schools with an A, 3 for a B, etc.


``` r
# Creating an index of progress grade and performance grade
data &lt;- data %&gt;% mutate(
  progress = case_when(
    progressgrade == &quot;A&quot; ~ 4,
    progressgrade == &quot;B&quot; ~ 3,
    progressgrade == &quot;C&quot; ~ 2,
    progressgrade == &quot;D&quot; ~ 1,
    progressgrade == &quot;F&quot; ~ 0,
    TRUE ~ NA_real_
  ),
  performance = case_when(
    performancegrade == &quot;A&quot; ~ 4,
    performancegrade == &quot;B&quot; ~ 3,
    performancegrade == &quot;C&quot; ~ 2,
    performancegrade == &quot;D&quot; ~ 1,
    performancegrade == &quot;F&quot; ~ 0,
    TRUE ~ NA_real_
  ),
  index = (progress + performance)/2
)
```

+--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------+
| ### NA and NA_real\_                                                                                                                                                                                                                                                                                                                                               |
+====================================================================================================================================================================================================================================================================================================================================================================+
| #### `NA`                                                                                                                                                                                                                                                                                                                                                          |
|                                                                                                                                                                                                                                                                                                                                                                    |
| -   **Type:**┬аGeneric missing value.                                                                                                                                                                                                                                                                                                                               |
|                                                                                                                                                                                                                                                                                                                                                                    |
| -   **Behavior:**┬аWhen used in expressions,┬а`NA`┬аcan adapt to the expected type of the output (integer, numeric, character, etc.). For example, if you&#39;re working with a numeric vector and use┬а`NA`, it will automatically be treated as┬а`NA_real_`.                                                                                                              |
|                                                                                                                                                                                                                                                                                                                                                                    |
| -   **Usage:**┬а`NA`┬аis flexible and can be used in various contexts, including vectors of different types.                                                                                                                                                                                                                                                         |
|                                                                                                                                                                                                                                                                                                                                                                    |
| #### `NA_real_`                                                                                                                                                                                                                                                                                                                                                    |
|                                                                                                                                                                                                                                                                                                                                                                    |
| -   **Type:**┬аSpecifically a missing value of type┬а`double`┬а(real numbers).                                                                                                                                                                                                                                                                                        |
|                                                                                                                                                                                                                                                                                                                                                                    |
| -   **Behavior:**┬аExplicitly indicates that the missing value is numeric and of type┬а`double`. This is important when you need to ensure that the data type remains consistent, especially in functions like┬а`mutate()`┬аwhere type consistency is crucial.                                                                                                         |
|                                                                                                                                                                                                                                                                                                                                                                    |
| -   **Usage:**┬аTypically used in numeric calculations or when creating variables where the type must be explicitly┬а`double`.                                                                                                                                                                                                                                       |
|                                                                                                                                                                                                                                                                                                                                                                    |
| #### Why Use┬а`NA_real_`?                                                                                                                                                                                                                                                                                                                                           |
|                                                                                                                                                                                                                                                                                                                                                                    |
| -   **Type Consistency:**┬аBy explicitly using┬а`NA_real_`, you ensure that the┬а`elementary`┬аvariable is always treated as a numeric vector. If you used┬а`NA`┬аinstead, R would still work correctly in this case, but using┬а`NA_real_`┬аmakes the intent clear and avoids potential issues if the type needs to be consistent, especially in more complex operations. |
|                                                                                                                                                                                                                                                                                                                                                                    |
| -   **Prevents Implicit Type Conversion:**┬аIf the context changes or if additional types are introduced,┬а`NA_real_`┬аensures that R does not implicitly convert the vector to another type, which might happen with┬а`NA`.                                                                                                                                           |
+--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------+

## Handling String Variables

Convert Percentage Variables to Numeric

**Breaking Down the Command:**

**`mutate(blackhispanic = as.numeric(gsub(&quot;%&quot;, &quot;&quot;, blackhispanic)))`:**

-   **`gsub(&quot;%&quot;, &quot;&quot;, blackhispanic)`:**┬аThis function removes the percentage signs (`%`) from the┬а`blackhispanic`variable. The┬а`gsub`┬аfunction replaces each occurrence of┬а`%`┬аwith an empty string (`&quot;&quot;`).

-   **`as.numeric(...)`:**┬аConverts the cleaned┬а`blackhispanic`┬аvalues (now just numbers in string form) into numeric data.

-   **`mutate(...)`:**┬аCreates a new version of the┬а`blackhispanic`┬аvariable within the┬а`data`┬аdataframe, replacing the original values with the cleaned numeric values.

## Extracting Substrings

The variable `dbn` contains the district, borough, and school number. The first 2 digits are the district number. The third digit is the borough. And the fourth through sixth digits are the school number.


``` r
# Extract district, borough, and school number from the dbn variable
data &lt;- data %&gt;% mutate(
  distnum = substr(dbn, 1, 2),
  borough = substr(dbn, 3, 3),
  schoolnum = substr(dbn, 4, 6)
)
```
